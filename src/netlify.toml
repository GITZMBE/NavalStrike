[build]
  command   = "npm run build"
  publish   = "build"
  functions = "netlify/functions"

[dev]
  command     = "npm start"
  port        = 3000
  targetPort  = 3000

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# Scheduled function — clean up stale/finished rooms every hour
[functions."cleanup-rooms"]
  schedule = "@hourly"
